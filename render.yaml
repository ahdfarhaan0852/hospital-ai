services:
  - type: web
    name: hospital-ai-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements-prod.txt && python build_render.py
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
